{% extends "emails/base.html" %}

{% block title %}{{ heading }}{% endblock %}

{% block content %}
  <h1 style="margin:0 0 16px; font-size:22px; font-weight:normal; color:#1B2B4A;">{{ heading }}</h1>
  <p style="margin:0 0 16px; font-size:15px; line-height:1.6; color:#4A5568; font-family:Arial, sans-serif;">
    Hi {{ name }},
  </p>
  <p style="margin:0 0 24px; font-size:15px; line-height:1.6; color:#4A5568; font-family:Arial, sans-serif;">
    {{ body }}
  </p>
  <a href="{{ site_url }}" style="display:inline-block; background:linear-gradient(135deg,#C8A951,#F0D98C); color:#14213D; text-decoration:none; font-weight:bold; font-size:14px; padding:12px 28px; border-radius:999px; font-family:Arial, sans-serif;">
    Visit Dr. Nath
  </a>
{% endblock %}
